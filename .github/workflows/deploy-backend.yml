name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - .github/workflows/deploy-backend.yml

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-southeast-1 | \
            docker login --username AWS --password-stdin \
            662829278911.dkr.ecr.ap-southeast-1.amazonaws.com

      - name: Build and push image
        run: |
          docker build --platform linux/amd64 -t cortex-backend ./backend
          docker tag cortex-backend:latest \
            662829278911.dkr.ecr.ap-southeast-1.amazonaws.com/cortex-backend:latest
          docker push \
            662829278911.dkr.ecr.ap-southeast-1.amazonaws.com/cortex-backend:latest

      - name: Register new task definition with secrets
        run: |
          # Get current task definition as base
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition cortex-backend \
            --query 'taskDefinition' --output json)

          # Inject latest image + secrets into env vars
          NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
          import json, sys
          td = json.load(sys.stdin)
          container = td['containerDefinitions'][0]
          container['image'] = '662829278911.dkr.ecr.ap-southeast-1.amazonaws.com/cortex-backend:latest'
          env = {e['name']: e['value'] for e in container.get('environment', [])}
          env['MINIMAX_API_KEY'] = '${{ secrets.MINIMAX_API_KEY }}'
          env['MINIMAX_GROUP_ID'] = '${{ secrets.MINIMAX_GROUP_ID }}'
          env['EXA_API_KEY'] = '${{ secrets.EXA_API_KEY }}'
          container['environment'] = [{'name': k, 'value': v} for k, v in env.items()]
          out = {k: td[k] for k in ['family','networkMode','requiresCompatibilities','cpu','memory','executionRoleArn','taskRoleArn','containerDefinitions']}
          print(json.dumps(out))
          ")

          # Register new revision
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "New task def: $NEW_ARN"

          # Update service to use new revision
          aws ecs update-service \
            --cluster cortex-cluster \
            --service cortex-backend \
            --task-definition $NEW_ARN \
            --force-new-deployment

      - name: Wait for stable
        run: |
          aws ecs wait services-stable \
            --cluster cortex-cluster \
            --services cortex-backend
          echo "### ✅ Backend deployed!" >> $GITHUB_STEP_SUMMARY
